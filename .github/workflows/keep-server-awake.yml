name: Keep Render Server Awake

on:
  # Chạy mỗi 10 phút (Render free tier sleep sau 15 phút không hoạt động)
  schedule:
    - cron: '*/10 * * * *'
  
  # Cho phép chạy thủ công từ GitHub UI
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping health endpoint
        env:
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          if [ -z "$RENDER_SERVICE_URL" ]; then
            echo "❌ RENDER_SERVICE_URL chưa được cấu hình"
            echo "Vui lòng thêm secret RENDER_SERVICE_URL vào GitHub repository"
            echo "Ví dụ: https://saigon-match-api.onrender.com"
            exit 1
          fi
          
          echo "🔔 Pinging Render server: ${RENDER_SERVICE_URL}/health"
          echo "⏰ Thời gian: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          
          # Gửi request đến endpoint health
          response=$(curl -s -w "\n%{http_code}" "${RENDER_SERVICE_URL}/health")
          http_code=$(echo "$response" | tail -n 1)
          body=$(echo "$response" | head -n -1)
          
          echo "📊 HTTP Status: $http_code"
          echo "📦 Response: $body"
          
          if [ "$http_code" = "200" ]; then
            echo "✅ Server đang hoạt động tốt!"
            exit 0
          else
            echo "⚠️ Server trả về status code: $http_code"
            echo "Server có thể đang wake up từ sleep mode..."
            exit 0
          fi
